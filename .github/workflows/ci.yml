name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy-trigger:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for trigger changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(src/trigger/|server/lib/|trigger\.config\.ts)'; then
            echo "trigger_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "trigger_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.trigger_changed == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.trigger_changed == 'true'
        run: npm ci

      - name: Deploy to Trigger.dev
        if: steps.changes.outputs.trigger_changed == 'true'
        env:
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_SECRET_KEY }}
        run: npx trigger.dev@latest deploy
