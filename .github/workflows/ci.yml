name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy-trigger:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for trigger changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(src/trigger/|server/lib/|trigger\.config\.ts)'; then
            echo "trigger_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "trigger_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.trigger_changed == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.trigger_changed == 'true'
        run: npm ci

      # Bump @trigger.dev/sdk + @trigger.dev/build to the latest patch right
      # before the deploy. Trigger.dev refuses to deploy when the CLI version
      # differs from the installed SDK version, so we install latest here and
      # then run the CLI as @latest in the next step — both resolve to the
      # same version within the same CI run, so they always match.
      # `--no-save` keeps package.json / package-lock.json untouched.
      - name: Update Trigger.dev SDK to latest
        if: steps.changes.outputs.trigger_changed == 'true'
        run: npm install --no-save @trigger.dev/sdk@latest @trigger.dev/build@latest

      - name: Deploy to Trigger.dev
        if: steps.changes.outputs.trigger_changed == 'true'
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: npx trigger.dev@latest deploy
